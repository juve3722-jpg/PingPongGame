<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Simple Pong</title>
<style>
  :root{
    --bg: #0b1220;
    --fg: #e6eef8;
    --accent: #39a1dd;
    --panel: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:linear-gradient(180deg,#071026 0%, #0b1220 100%);
    color:var(--fg);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .wrap{
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
  }
  header{
    display:flex;
    gap:20px;
    align-items:center;
    background:var(--panel);
    padding:10px 16px;
    border-radius:10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .score{
    font-size:22px;
    letter-spacing:1px;
  }
  .controls{
    font-size:13px;
    color: #c8d8ea;
  }
  canvas{
    display:block;
    background: radial-gradient(circle at 20% 20%, rgba(57,161,221,0.06), transparent 10%), rgba(255,255,255,0.02);
    border-radius:14px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    cursor: none; /* hide pointer for mouse control clarity */
  }
  .footer {
    text-align:center;
    color:#9fb7cf;
    font-size:13px;
    margin-top:4px;
  }
  .btn {
    background:transparent;
    color:var(--fg);
    border:1px solid rgba(255,255,255,0.06);
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
  .btn:active{transform:translateY(1px)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="score" id="scoreDisplay">Player 0 — 0 Computer</div>
    <div class="controls">Controls: Move mouse over canvas or use ↑ ↓ keys</div>
    <button id="resetBtn" class="btn">Reset</button>
  </header>

  <canvas id="game" width="900" height="550" aria-label="Pong game"></canvas>

  <div class="footer">Simple Pong — left paddle is player, right paddle is computer.</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const resetBtn = document.getElementById('resetBtn');

  const W = canvas.width;
  const H = canvas.height;

  // Game objects
  const paddleWidth = 14;
  const paddleHeight = 110;
  const paddlePad = 20;

  const player = {
    x: paddlePad,
    y: (H - paddleHeight)/2,
    w: paddleWidth,
    h: paddleHeight,
    speed: 6,
    moveUp: false,
    moveDown: false
  };

  const computer = {
    x: W - paddlePad - paddleWidth,
    y: (H - paddleHeight)/2,
    w: paddleWidth,
    h: paddleHeight,
    speed: 4 // AI max speed per frame
  };

  const ball = {
    x: W/2,
    y: H/2,
    r: 10,
    speed: 6,
    vx: 6,
    vy: 2
  };

  let score = { player: 0, computer: 0 };
  let paused = false;
  let serveTimeout = null;

  // Utility
  function resetBall(direction = 0) {
    // direction: -1 serve to left, 1 serve to right, 0 random
    ball.x = W/2;
    ball.y = H/2;
    ball.speed = 6;
    const angle = (Math.random()*Math.PI/4) - (Math.PI/8); // -22.5..22.5 deg
    const dir = direction === 0 ? (Math.random() < 0.5 ? -1 : 1) : direction;
    ball.vx = dir * ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
  }

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  // Input
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const y = e.clientY - rect.top;
    // center the paddle on mouse Y
    player.y = clamp(y - player.h/2, 0, H - player.h);
  });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') player.moveUp = true;
    if (e.key === 'ArrowDown') player.moveDown = true;
    if (e.key === ' '){ paused = !paused; } // space to pause/resume
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowUp') player.moveUp = false;
    if (e.key === 'ArrowDown') player.moveDown = false;
  });

  resetBtn.addEventListener('click', () => {
    score.player = 0; score.computer = 0;
    updateScoreDisplay();
    resetBall( Math.random() < 0.5 ? -1 : 1 );
  });

  // Collisions
  function rectCircleColliding(cx, cy, r, rx, ry, rw, rh) {
    // Find closest point to circle within rectangle
    const closestX = clamp(cx, rx, rx + rw);
    const closestY = clamp(cy, ry, ry + rh);
    const dx = cx - closestX;
    const dy = cy - closestY;
    return (dx*dx + dy*dy) <= r*r;
  }

  function updateScoreDisplay(){
    scoreDisplay.textContent = `Player ${score.player} — ${score.computer} Computer`;
  }

  // Game update loop
  function update() {
    if (paused) {
      draw();
      requestAnimationFrame(update);
      return;
    }

    // Player keyboard movement (mouse takes precedence when used, but keyboard still works)
    if (player.moveUp) player.y -= player.speed;
    if (player.moveDown) player.y += player.speed;
    player.y = clamp(player.y, 0, H - player.h);

    // Computer AI - follow ball with a max speed
    // Slight predictive behavior: move to ball.y center but with some smoothing
    const targetY = ball.y - computer.h / 2;
    const diff = targetY - computer.y;
    // Make AI a bit imperfect:
    const aiSpeed = computer.speed;
    computer.y += clamp(diff, -aiSpeed, aiSpeed);
    computer.y = clamp(computer.y, 0, H - computer.h);

    // Move ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall collision (top / bottom)
    if (ball.y - ball.r <= 0) {
      ball.y = ball.r;
      ball.vy = -ball.vy;
    } else if (ball.y + ball.r >= H) {
      ball.y = H - ball.r;
      ball.vy = -ball.vy;
    }

    // Paddle collisions
    // Left paddle (player)
    if (ball.vx < 0 && rectCircleColliding(ball.x, ball.y, ball.r, player.x, player.y, player.w, player.h)) {
      // reflect and add angle based on where it hit the paddle
      const relativeY = (ball.y - (player.y + player.h/2)) / (player.h/2); // -1..1
      const bounceAngle = relativeY * (Math.PI/3); // up to 60 degrees
      const speedUp = 1.05; // increase speed slightly each paddle hit
      const newSpeed = Math.min(18, Math.hypot(ball.vx, ball.vy) * speedUp);
      ball.vx = Math.abs(newSpeed * Math.cos(bounceAngle));
      ball.vy = newSpeed * Math.sin(bounceAngle);
      // ensure ball is outside paddle to avoid sticking
      ball.x = player.x + player.w + ball.r + 0.5;
    }

    // Right paddle (computer)
    if (ball.vx > 0 && rectCircleColliding(ball.x, ball.y, ball.r, computer.x, computer.y, computer.w, computer.h)) {
      const relativeY = (ball.y - (computer.y + computer.h/2)) / (computer.h/2);
      const bounceAngle = relativeY * (Math.PI/3);
      const speedUp = 1.05;
      const newSpeed = Math.min(18, Math.hypot(ball.vx, ball.vy) * speedUp);
      ball.vx = -Math.abs(newSpeed * Math.cos(bounceAngle));
      ball.vy = newSpeed * Math.sin(bounceAngle);
      ball.x = computer.x - ball.r - 0.5;
    }

    // Scoring
    if (ball.x < -ball.r) {
      // Computer scores
      score.computer += 1;
      updateScoreDisplay();
      serveAfterPoint(1); // serve to right (computer serves)
    } else if (ball.x > W + ball.r) {
      // Player scores
      score.player += 1;
      updateScoreDisplay();
      serveAfterPoint(-1); // serve to left (player serves)
    }

    draw();
    requestAnimationFrame(update);
  }

  function serveAfterPoint(direction) {
    paused = true;
    clearTimeout(serveTimeout);
    // brief pause then reset
    serveTimeout = setTimeout(() => {
      resetBall(direction);
      paused = false;
    }, 900);
  }

  // Drawing
  function drawNet(){
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    const step = 18;
    for (let y=0; y<H; y+=step*1.6){
      ctx.fillRect(W/2 - 1, y, 2, step*0.9);
    }
  }

  function draw() {
    // clear
    ctx.clearRect(0,0,W,H);

    // background subtle
    ctx.fillStyle = 'rgba(255,255,255,0.01)';
    ctx.fillRect(0,0,W,H);

    // net
    drawNet();

    // paddles
    // left
    ctx.fillStyle = '#dff7ff';
    roundRect(ctx, player.x, player.y, player.w, player.h, 6);
    // right
    ctx.fillStyle = '#9fd8f1';
    roundRect(ctx, computer.x, computer.y, computer.w, computer.h, 6);

    // ball
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    // scoreboard overlay
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(W/2 - 140, 12, 280, 42);
    ctx.fillStyle = '#e6eef8';
    ctx.font = '20px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${score.player} — ${score.computer}`, W/2, 33);

    // small hint text
    if (paused) {
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.font = '15px system-ui, sans-serif';
      ctx.fillText('Paused', W/2, H/2 - 30);
    }
  }

  // helper: rounded rect
  function roundRect(ctx, x, y, w, h, r) {
    const radius = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.fill();
  }

  // start game
  updateScoreDisplay();
  resetBall(Math.random() < 0.5 ? -1 : 1);
  requestAnimationFrame(update);

  // Resize handling: adapt canvas CSS for responsiveness but keep internal resolution fixed
  function fitCanvas() {
    // scale canvas to fit viewport while keeping aspect ratio
    const maxWidth = Math.min(window.innerWidth - 40, 1000);
    const scale = Math.min(maxWidth / W, (window.innerHeight - 160) / H, 1);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

})();
</script>
</body>
</html>
